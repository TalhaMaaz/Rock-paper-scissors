<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <h1>Rock Paper Scissors</h1>
    </header>
    <p class="info">Hi, Welcome!</p>

    <main class="game">
      <div class="choices">
        <button class="rock" onclick="playgame('rock')">
          <img src="images/rock-emoji.png" alt="Rock" />
        </button>
        <button class="paper" onclick="playgame('paper')">
          <img src="images/paper-emoji.png" alt="Paper" />
        </button>
        <button class="scissors" onclick="playgame('scissors')">
          <img src="images/scissors-emoji.png" alt="Scissors" />
        </button>
      </div>
    </main>

    <footer class="hud">
      <div class="legend">
        <div class="legend-item"><span class="box player"></span> Player</div>
        <div class="legend-item"><span class="box cpu"></span> Computer</div>
        <div class="legend-item"><span class="box tie"></span> Tie</div>
      </div>
      <div class="score">
        <p id="wins">Wins: 0</p>
        <p id="losses">Losses: 0</p>
        <p id="ties">Ties: 0</p>
      </div>

      <button
        class="reset"
        onclick="
          resetScore();
          displayScore();
        "
      >
        Reset
      </button>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
